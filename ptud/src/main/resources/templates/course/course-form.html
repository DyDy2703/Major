<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Form học phần</h2>

    <form th:action="@{/admin/course/save}" th:object="${course}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Tên học phần</label>
            <input type="text" th:field="*{name}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Số tín chỉ</label>
            <input type="number" th:field="*{credits}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Giảng viên</label>
            <input type="text" th:field="*{lecturer}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Hình ảnh (URL)</label>
            <input type="text" th:field="*{image}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <select th:field="*{category}" class="form-control">
                <option th:each="c : ${categories}"
                        th:value="${c}"
                        th:text="${c.name}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a href="/" class="btn btn-secondary">Quay lại</a>

    </form>
</div>

</body>
</html>
