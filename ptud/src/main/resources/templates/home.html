<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách học phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">📚 Danh sách học phần</h2>
    <a href="/admin/course/add" class="btn btn-success mb-3">+ Thêm học phần</a>

    <table class="table table-bordered table-hover text-center">
        <thead class="table-dark">
        <tr>
            <th>Tên học phần</th>
            <th>Số tín chỉ</th>
            <th>Giảng viên</th>
            <th>Hình ảnh</th>
            <th>Hành động</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="course : ${coursePage.content}">
            <td th:text="${course.name}"></td>
            <td th:text="${course.credits}"></td>
            <td th:text="${course.lecturer}"></td>
            <td>
                <img th:src="${course.image}" width="100"/>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Pagination -->
    <nav class="d-flex justify-content-center">
        <ul class="pagination">
            <tr th:each="course : ${coursePage.content}">
                <td th:text="${course.name}"></td>
                <td th:text="${course.credits}"></td>
                <td th:text="${course.lecturer}"></td>
                <td>
                    <img th:src="${course.image}" width="100"/>
                </td>
                <td>
                    <a th:href="@{/admin/course/edit/{id}(id=${course.id})}"
                       class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{/admin/course/delete/{id}(id=${course.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                </td>
            </tr>

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${currentPage - 1})}">Previous</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/(page=${i})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item"
                th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/(page=${currentPage + 1})}">Next</a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
